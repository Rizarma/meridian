name: Security & Quality Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────────────────────────────────────
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --json --audit-level=moderate > audit-results.json || true
          cat audit-results.json

      - name: Check for high/critical vulnerabilities
        run: |
          # Filter out known transitive dependency issues that are outside our control
          # bigint-buffer CVE-2025-3194: comes from @meteora-ag/dlmm -> @solana/spl-token chain
          FILTERED_AUDIT=$(cat audit-results.json | jq '
            if .advisories then
              .advisories |= with_entries(
                select(.value.module_name != "bigint-buffer")
              ) |
              .metadata.vulnerabilities.high = ([.advisories[] | select(.severity == "high")] | length) |
              .metadata.vulnerabilities.critical = ([.advisories[] | select(.severity == "critical")] | length)
            else
              .metadata.vulnerabilities.high = 0 |
              .metadata.vulnerabilities.critical = 0
            end
          ')
          
          HIGH_COUNT=$(echo "$FILTERED_AUDIT" | jq '.metadata.vulnerabilities.high // 0')
          CRITICAL_COUNT=$(echo "$FILTERED_AUDIT" | jq '.metadata.vulnerabilities.critical // 0')
          
          echo "High severity (filtered): $HIGH_COUNT"
          echo "Critical severity (filtered): $CRITICAL_COUNT"
          
          # Show all advisories for transparency
          echo ""
          echo "All advisories (including filtered):"
          cat audit-results.json | jq -r 'if .advisories then .advisories[] | "  - \(.module_name): \(.title) [\(.severity)]" else "No advisories found" end' || true
          
          if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Found high or critical vulnerabilities"
            exit 1
          fi
          
          echo "✅ No high or critical vulnerabilities found (bigint-buffer CVE-2025-3194 is a known transitive issue)"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: audit-results.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Secret Scanning (GitLeaks)
  # ─────────────────────────────────────────────────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Code Quality (Biome)
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm biome check --reporter=github .

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Build Verification
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          echo "✅ Build successful"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Tech Debt Scan (TODO/FIXME tracking)
  # ─────────────────────────────────────────────────────────────────────────────
  tech-debt:
    name: Tech Debt Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tech debt scan
        run: pnpm tech-debt:ci

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 7: Duplicate Code Detection
  # ─────────────────────────────────────────────────────────────────────────────
  duplicates:
    name: Duplicate Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run duplicate code scan
        run: pnpm duplicates:ci

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 8: Architecture Check (Module Boundaries)
  # ─────────────────────────────────────────────────────────────────────────────
  architecture:
    name: Module Boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check module boundaries
        run: pnpm arch-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 9: Security Summary
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependencies, secrets, quality, build, tech-debt, duplicates, architecture]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security & Quality Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tech Debt Scan | ${{ needs.tech-debt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duplicate Code | ${{ needs.duplicates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Module Boundaries | ${{ needs.architecture.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ CodeQL analysis is handled by GitHub's default setup" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.dependencies.result }}" == "failure" ]; then
            echo "⚠️ **Action Required:** High or critical dependency vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          fi
