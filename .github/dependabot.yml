version: 2

updates:
  # ─────────────────────────────────────────────────────────────────────────────
  # npm/pnpm dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Rizarma"
    assignees:
      - "Rizarma"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    # Group related updates to reduce PR noise
    groups:
      # Group all patch updates together
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
      # Group Solana/web3 updates (often related)
      solana:
        patterns:
          - "@solana/*"
          - "@coral-xyz/*"
          - "@meteora-ag/*"
      # Group dev tooling
      dev-tools:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "@types/*"
          - "cross-env"
    ignore:
      # Ignore major version updates for critical packages (manual review required)
      - dependency-name: "@solana/web3.js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@coral-xyz/anchor"
        update-types: ["version-update:semver-major"]

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Actions
  # ─────────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Rizarma"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci-cd"
