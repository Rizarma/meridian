changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
      - factory-droid[bot]
  categories:
    - title: Breaking Changes 🚨
      labels:
        - breaking
        - breaking-change
    - title: New Features ✨
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
        - bugfix
    - title: Performance Improvements ⚡
      labels:
        - performance
        - optimization
    - title: Documentation 📚
      labels:
        - documentation
        - docs
    - title: Infrastructure & Tooling 🛠️
      labels:
        - infrastructure
        - tooling
        - ci
        - devops
    - title: Other Changes
      labels:
        - "*"
